{% extends "base.html" %}

{% block content %}
  <h1>Delete Driver</h1>
  <p>Are you sure you want to delete the driver: <strong>{{ driver.username }}</strong>?</p>

  <form action="" method="post">
    {% csrf_token %}
    <input type="submit" value="Yes, delete" class="btn btn-danger">

    <a href="{{ request.META.HTTP_REFERER|default:'/taxi/drivers/' }}" class="btn btn-secondary">
      Cancel
    </a>
  </form>
{% endblock %}
